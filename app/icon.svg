<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- warm circle backdrop -->
  <circle cx="50" cy="50" r="48" fill="#ffd76b" stroke="#1a1a1a" stroke-width="3"/>

  <!-- ears -->
  <path d="M22 38 L26 14 L42 32 Z" fill="#8a6332" stroke="#3a2614" stroke-width="2" stroke-linejoin="round"/>
  <path d="M78 38 L74 14 L58 32 Z" fill="#8a6332" stroke="#3a2614" stroke-width="2" stroke-linejoin="round"/>
  <path d="M27 32 L29 22 L37 32 Z" fill="#e8b890"/>
  <path d="M73 32 L71 22 L63 32 Z" fill="#e8b890"/>

  <!-- head -->
  <ellipse cx="50" cy="56" rx="34" ry="30" fill="#a87e4a" stroke="#3a2614" stroke-width="2.5"/>

  <!-- tabby M -->
  <g stroke="#3a2614" stroke-width="2.2" fill="none" stroke-linecap="round">
    <path d="M42 36 Q44 44 47 48"/>
    <path d="M50 36 Q51 44 53 48"/>
    <path d="M58 36 Q56 44 53 48"/>
  </g>

  <!-- cheek tufts -->
  <ellipse cx="30" cy="64" rx="9" ry="6" fill="#b88a52" opacity="0.55"/>
  <ellipse cx="70" cy="64" rx="9" ry="6" fill="#b88a52" opacity="0.55"/>

  <!-- white muzzle -->
  <path d="M36 60 Q50 76 64 60 Q63 74 50 76 Q37 74 36 60 Z" fill="#f5e6d0"/>

  <!-- eyes: sclera, green outer, dark green inner, slit pupil, catch-light -->
  <ellipse cx="37" cy="52" rx="8" ry="9" fill="#f4ead0" stroke="#3a2614" stroke-width="2"/>
  <ellipse cx="63" cy="52" rx="8" ry="9" fill="#f4ead0" stroke="#3a2614" stroke-width="2"/>
  <ellipse cx="37" cy="52" rx="6.5" ry="8" fill="#7ac46a"/>
  <ellipse cx="63" cy="52" rx="6.5" ry="8" fill="#7ac46a"/>
  <ellipse cx="37" cy="52" rx="4.5" ry="7" fill="#3a6a2a"/>
  <ellipse cx="63" cy="52" rx="4.5" ry="7" fill="#3a6a2a"/>
  <ellipse cx="37" cy="52" rx="1.4" ry="6.5" fill="#1a1a1a"/>
  <ellipse cx="63" cy="52" rx="1.4" ry="6.5" fill="#1a1a1a"/>
  <circle cx="35" cy="49" r="1.7" fill="#ffffff"/>
  <circle cx="61" cy="49" r="1.7" fill="#ffffff"/>

  <!-- nose -->
  <path d="M46 64 L54 64 L50 70 Z" fill="#d68a8a" stroke="#3a2614" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- mouth -->
  <path d="M50 70 Q46 75 42 73" stroke="#3a2614" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M50 70 Q54 75 58 73" stroke="#3a2614" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
